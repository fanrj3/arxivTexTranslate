name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build service UI
        run: npm run build
