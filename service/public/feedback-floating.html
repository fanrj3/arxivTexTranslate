<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback package</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: transparent;
        color: #0f172a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Microsoft YaHei", sans-serif;
      }
      .panel {
        height: 100vh;
        border: 1px solid rgba(15, 23, 42, 0.18);
        border-radius: 16px;
        background: rgba(248, 250, 252, 0.96);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.2);
        overflow: hidden;
      }
      .titlebar {
        -webkit-app-region: drag;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px 10px;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }
      .titlebar strong {
        font-size: 14px;
      }
      .close {
        -webkit-app-region: no-drag;
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 8px;
        background: rgba(15, 23, 42, 0.06);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }
      main {
        display: grid;
        gap: 10px;
        padding: 14px;
      }
      .hint {
        margin: 0;
        color: #64748b;
        font-size: 12px;
        line-height: 1.55;
      }
      .zip {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        min-height: 76px;
        border: 1px solid rgba(20, 184, 166, 0.35);
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(240, 253, 250, 0.96), rgba(255, 255, 255, 0.92));
        padding: 12px;
        cursor: grab;
        user-select: none;
      }
      .zip:active {
        cursor: grabbing;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .action {
        flex: 1;
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 10px;
        background: white;
        color: #0f172a;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        padding: 8px 10px;
        text-align: center;
        text-decoration: none;
      }
      .action:hover {
        border-color: rgba(20, 184, 166, 0.45);
        color: #0f8f7f;
      }
      .icon {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: #0f8f7f;
        color: white;
        font-weight: 800;
      }
      .name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 800;
      }
      .meta {
        margin-top: 4px;
        color: #64748b;
        font-size: 12px;
      }
      .issue-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.05);
        padding: 8px 10px;
        color: #334155;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <header class="titlebar">
        <strong>Feedback package ready</strong>
        <button class="close" type="button" title="Close" aria-label="Close">x</button>
      </header>
      <main>
        <p class="hint">Drag the ZIP below into the GitHub Issue body. If GitHub rejects this drag, open it in Explorer and drag the ZIP from there.</p>
        <div class="zip" draggable="true" id="zip-card">
          <div class="icon">ZIP</div>
          <div>
            <div class="name" id="zip-name">log.zip</div>
            <div class="meta" id="zip-meta">Loading file info...</div>
          </div>
        </div>
        <div class="actions">
          <button class="action" type="button" id="show-file">Show in Explorer</button>
          <a class="action" id="download-file" href="#" download>Download ZIP</a>
        </div>
        <div class="issue-title" id="issue-title"></div>
      </main>
    </section>
    <script>
      const params = new URLSearchParams(location.search);
      const file = params.get("file") || "";
      const title = params.get("title") || "arXiv Translate feedback";
      const closeButton = document.querySelector(".close");
      const card = document.querySelector("#zip-card");
      const nameEl = document.querySelector("#zip-name");
      const metaEl = document.querySelector("#zip-meta");
      const titleEl = document.querySelector("#issue-title");
      const showButton = document.querySelector("#show-file");
      const downloadLink = document.querySelector("#download-file");
      let info = null;

      closeButton.addEventListener("click", () => window.close());
      titleEl.textContent = title;

      function formatSize(bytes) {
        if (!Number.isFinite(bytes)) return "";
        if (bytes >= 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
        return `${Math.max(1, Math.round(bytes / 1024))} KB`;
      }

      async function loadInfo() {
        if (!file) {
          metaEl.textContent = "Missing feedback file name";
          return;
        }
        const response = await fetch(`/api/feedback/${encodeURIComponent(file)}/info`);
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error || "Failed to read file info");
        info = data;
        nameEl.textContent = data.fileName;
        metaEl.textContent = `${formatSize(data.size)} - drag to upload`;
        downloadLink.href = data.downloadUrl || `/api/feedback/${encodeURIComponent(data.fileName)}`;
        downloadLink.download = data.fileName;
      }

      card.addEventListener("dragstart", (event) => {
        if (!info) return;
        event.preventDefault();
        window.feedbackBridge?.startDrag(info.filePath);
      });

      showButton.addEventListener("click", () => {
        if (!info) return;
        window.feedbackBridge?.showItem(info.filePath);
      });

      loadInfo().catch((error) => {
        metaEl.textContent = error.message || "Failed to read file info";
      });
    </script>
  </body>
</html>
